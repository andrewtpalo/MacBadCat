name: Build iOS Simulator app (for Appetize preview)

# Lets a Windows user with no Mac get a runnable build.
# Runs on a free macOS cloud runner, produces "BadCat-Simulator.zip"
# which you upload to https://appetize.io to play it in your browser.

on:
  workflow_dispatch:        # run it manually from the Actions tab
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Ensure Metal toolchain is available
        run: |
          echo "Xcode: $(xcodebuild -version | head -1)"
          # Xcode 16.3+ ships the Metal compiler as a separately-downloadable component.
          # Without it nothing can produce default.metallib and SpriteKit crashes at first render.
          xcodebuild -downloadComponent MetalToolchain || echo "(-downloadComponent unsupported or already present)"
          echo "=== metal compiler check ==="
          if xcrun -sdk iphonesimulator metal --version; then
            echo "RESULT: metal compiler IS available"
          else
            echo "RESULT: metal compiler NOT available on this runner"
          fi

      - name: Render app icon
        run: |
          swift Tools/make_icon.swift
          ls -la App/Assets.xcassets/AppIcon.appiconset/

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator (no signing needed)
        run: |
          xcodebuild build \
            -project MacBadCat.xcodeproj \
            -scheme MacBadCat \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Check default.metallib is in the bundle
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -n 1)
          echo "=== App bundle: $APP_PATH ==="
          ls -la "$APP_PATH"
          echo "=== any .metallib in bundle ==="
          find "$APP_PATH" -name "*.metallib" -print
          if find "$APP_PATH" -name "default.metallib" | grep -q .; then
            echo "RESULT: OK — default.metallib IS present"
          else
            echo "RESULT: MISSING — default.metallib is NOT in the bundle"
          fi
          echo "=== any .metallib anywhere in derived data ==="
          find build -name "*.metallib" -print | head

      - name: Ensure default.metallib exists (inject if missing)
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -n 1)
          if find "$APP_PATH" -name "default.metallib" | grep -q .; then
            echo "default.metallib already present — nothing to do"
          else
            echo "default.metallib MISSING — compiling and injecting one (SpriteKit needs it)"
            xcrun -sdk iphonesimulator metal -c App/Sources/DefaultLibrary.metal -o "$RUNNER_TEMP/dummy.air"
            xcrun -sdk iphonesimulator metallib "$RUNNER_TEMP/dummy.air" -o "$APP_PATH/default.metallib"
            echo "Injected:"
            ls -la "$APP_PATH/default.metallib"
          fi

      - name: Ad-hoc sign simulator app
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -n 1)
          echo "Signing: $APP_PATH"
          codesign --force --sign - "$APP_PATH"

      - name: Verify simulator binary architecture
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -n 1)
          echo "App bundle: $APP_PATH"
          EXECUTABLE=$(plutil -extract CFBundleExecutable xml1 -o - "$APP_PATH/Info.plist" | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "Executable: $EXECUTABLE"
          lipo -info "$APP_PATH/$EXECUTABLE"

      - name: Zip the .app for Appetize
        run: |
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -maxdepth 1 -name "*.app" | head -n 1)
          echo "Found: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          ditto -c -k --sequesterRsrc --keepParent "$(basename "$APP_PATH")" "$GITHUB_WORKSPACE/BadCat-Simulator.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BadCat-Simulator
          path: BadCat-Simulator.zip

      # OPTIONAL: auto-upload to Appetize so you skip the manual step.
      # Add a repo secret named APPETIZE_TOKEN (from appetize.io account settings),
      # then uncomment the step below. It prints a public URL you open on Windows.
      #
      # - name: Upload to Appetize
      #   run: |
      #     curl -sS https://${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps \
      #       -F "file=@BadCat-Simulator.zip" -F "platform=ios" | tee appetize.json
      #     echo "Open the publicURL printed above on your PC."
